<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="exp-4.css">
</head>
<body>
    <main class="page-wrap">
        <section class="container">
            <h1>Student Result Calculator</h1>
            <p class="subtitle">Add your subjects and calculate total, average, grade, and pass or fail result.</p>

            <div class="controls">
                <label for="subjects">Number of Subjects</label>
                <input type="number" id="subjects" min="1" max="20" placeholder="e.g. 5">
                <button type="button" id="generateBtn">Generate Subject Fields</button>
            </div>

            <form id="marksForm" novalidate>
                <div id="marksContainer" class="marks-grid"></div>
                <button type="submit" id="calculateBtn" class="primary" disabled>Calculate Result</button>
            </form>

            <div id="result" class="result-card"></div>
        </section>
    </main>
    <script src="exp4.js"></script>
</body>
</html>
